<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" ></link>
    <title>Interaccion Html + Js</title>
</head>
<body>
    
    <div class="container">
        <h1>Interacción HTML con JavaScript</h1>
        <label for="name">Escribe algo</label>
        <input id="name" type="text" placeholder="Escribe aquí">
        <div class="buttons">
            <button id="showBtn">Mostrar</button>
            <button id="clearBtn">Borrar</button>
        </div>
        <p id="output">Aquí aparecera tu text</p>
        <p id="count">Caracteres: 0</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
